<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>AGENTS.md Generator</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Vazirmatn:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />

    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem('theme');
          var savedLang = localStorage.getItem('lang') || 'fa';
          var isDark =
            savedTheme === 'dark' ||
            (!savedTheme && typeof window.matchMedia === 'function' && window.matchMedia('(prefers-color-scheme: dark)').matches);

          document.documentElement.lang = savedLang;
          document.documentElement.dir = savedLang === 'fa' ? 'rtl' : 'ltr';

          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (_error) {
          document.documentElement.lang = 'fa';
          document.documentElement.dir = 'rtl';
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
